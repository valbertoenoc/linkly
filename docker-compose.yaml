services:
  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - linkly
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=linkly
    ports:
      - "5432:5432"

  linkly:
    restart: always
    networks:
      - linkly
    depends_on:
      db:
        condition: service_healthy
        restart: true
    build:
      context: .
    command:
      - "uvicorn"
      - "app.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
        - "8000:8000"
    env_file:
      - .env
        # develop:
        #       watch:
        #         - path: ./backend
        #           action: sync
        #           target: /app/backend
        #           ignore:
        #             - ./backend/.venv
        #             - .venv
        #         - path: ./backend/pyproject.toml
        #           action: rebuild

volumes:
  app-db-data:

networks:
  linkly:
    # external: true
    driver: bridge
